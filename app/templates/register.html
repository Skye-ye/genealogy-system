{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="card narrow">
  <h1>注册</h1>
  <form method="post">
    <label>用户名 <input name="username" required autofocus></label>
    <label>邮箱（可选）<input name="email" type="email"></label>
    <label>密码 <input name="password" type="password" required minlength="4"></label>
    <button type="submit">创建账号</button>
  </form>
</div>
{% endblock %}
